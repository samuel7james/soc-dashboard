version: 2

updates:
  # pnpm workspace — a single root entry covers every app/package manifest.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Cut PR noise: patch/minor bumps land together, majors stay individual
      # so a breaking change is never silently bundled with routine updates.
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
