name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.2"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soc
          POSTGRES_PASSWORD: soc_ci_password
          POSTGRES_DB: soc_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U soc -d soc_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://soc:soc_ci_password@localhost:5432/soc_platform?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-only-test-secret-at-least-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter @soc/database exec prisma migrate deploy

      - name: Seed reference data
        # Several tests create AlertMitreMapping rows, which have a real FK
        # constraint to mitre_techniques — migrate deploy only applies
        # schema, it doesn't populate that table. The seed script is fully
        # idempotent (upserts/existence-guarded throughout), safe to run
        # against a fresh CI database every time.
        run: pnpm --filter @soc/database db:seed

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        # No external coverage service (Codecov/Coveralls) is wired up yet —
        # this uploads the raw lcov/json-summary reports as a workflow
        # artifact so they're inspectable without one. Swapping in a hosted
        # service later just means adding its action + a repo secret here.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage
            apps/worker/coverage
            packages/auth/coverage
            packages/connectors/coverage
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps and packages
        run: pnpm build

  docker-build:
    name: Docker Build (api / worker / web)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
