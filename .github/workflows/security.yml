name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catch newly-disclosed CVEs in existing dependencies even on weeks with no code changes.
    - cron: "0 6 * * 1"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.2"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql-javascript-typescript

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep.sarif
        # Runs the community/auto ruleset — no Semgrep AppSec Platform
        # account or SEMGREP_APP_TOKEN required. Add one later for premium
        # rulesets and PR comments.

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # `pnpm audit` called npm's legacy quick-audit endpoint
  # (/-/npm/v1/security/audits), which the npm registry retired in favor of
  # the bulk advisory endpoint — every pnpm 10.x release (including the
  # 10.28.2 pinned above) hits a 410 Gone from that endpoint as of the
  # retirement date. The fix lives in pnpm v11 (which queries the new bulk
  # endpoint), but v11 requires Node 22, a much bigger bump than this CI job
  # warrants on its own — OSV-Scanner scans pnpm-lock.yaml directly against
  # the OSV.dev database and isn't affected by the npm registry endpoint
  # retirement at all. Verified locally against this repo's actual
  # pnpm-lock.yaml (972 packages, "No issues found") before wiring in here.
  osv-scanner:
    name: OSV-Scanner (dependency vulnerabilities)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: true

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 30

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        target: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image (local only, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: soc-platform/${{ matrix.target }}:scan
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Scan image with Trivy
        # Pinned to a commit SHA, not just the v0.36.0 tag: this action had a
        # real supply-chain incident in March 2026 where an attacker
        # force-pushed 75 of 76 version tags to try to steal CI/CD secrets.
        # A tag can be moved again; a commit SHA can't.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: soc-platform/${{ matrix.target }}:scan
          format: sarif
          output: trivy-${{ matrix.target }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.target }}.sarif
          category: trivy-${{ matrix.target }}
