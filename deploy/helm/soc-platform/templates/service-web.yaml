apiVersion: v1
kind: Service
metadata:
  name: {{ include "soc-platform.fullname" . }}-web
  labels:
    {{- include "soc-platform.componentLabels" (merge (dict "component" "web") .) | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "soc-platform.componentSelectorLabels" (merge (dict "component" "web") .) | nindent 4 }}
