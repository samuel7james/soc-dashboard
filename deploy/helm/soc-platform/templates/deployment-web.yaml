apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "soc-platform.fullname" . }}-web
  labels:
    {{- include "soc-platform.componentLabels" (merge (dict "component" "web") .) | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "soc-platform.componentSelectorLabels" (merge (dict "component" "web") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soc-platform.componentLabels" (merge (dict "component" "web") .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "soc-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "soc-platform.image" (dict "root" $ "component" "web") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.web.service.targetPort | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
          # No liveness/readiness endpoint of its own — the web app has no
          # backend of its own to be unready for (it's a Next.js standalone
          # server whose only dependency is the API, called client-side per
          # request, not at server boot). /login always renders regardless
          # of auth state or API reachability, so it's a reliable, lightweight
          # probe target without needing a bespoke health route.
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
