apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "soc-platform.fullname" . }}-config
  labels:
    {{- include "soc-platform.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}
  PORT: {{ .Values.config.api.port | quote }}
  HOST: {{ .Values.config.api.host | quote }}
  HEALTH_PORT: {{ .Values.config.worker.healthPort | quote }}
  SYSLOG_UDP_PORT: {{ .Values.config.worker.syslogUdpPort | quote }}
  SYSLOG_UDP_HOST: {{ .Values.config.worker.syslogUdpHost | quote }}
  DEMO_MODE_POLL_INTERVAL_MS: {{ .Values.config.worker.demoModePollIntervalMs | quote }}
