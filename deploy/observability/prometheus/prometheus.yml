global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # api/worker never talk to Prometheus directly — this is the collector's
  # own OTLP-to-Prometheus exporter (see otel-collector-config.yaml), which
  # is a pull target, not a push destination.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
