name: soc-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc_dev_password
      POSTGRES_DB: soc_platform
    ports:
      - "5432:5432"
    volumes:
      - soc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: soc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - soc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  soc-postgres-data:
  soc-redis-data:
