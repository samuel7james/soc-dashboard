name: soc-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc_dev_password
      POSTGRES_DB: soc_platform
    ports:
      - "5432:5432"
    volumes:
      - soc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: soc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - soc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # api/worker/web run behind the "full" profile — plain `docker compose up`
  # still only starts postgres+redis (the normal local-dev workflow, where
  # the apps run via `pnpm dev` on the host for fast reload). Bring up the
  # fully containerized stack with `docker compose --profile full up --build`.
  api:
    build:
      context: .
      target: api
    container_name: soc-api
    restart: unless-stopped
    profiles: ["full"]
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://soc:soc_dev_password@postgres:5432/soc_platform?schema=public
      REDIS_URL: redis://redis:6379
      # A `?`-required var here would make Compose fail to interpolate even
      # `docker compose up postgres redis` (Compose validates every
      # service's environment block up front, regardless of --profile) — so
      # this is a labeled, obviously-fake local-dev default, same spirit as
      # POSTGRES_PASSWORD above. Override via a real JWT_ACCESS_SECRET in
      # your shell/.env for anything beyond throwaway local testing.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-only-insecure-default-secret-override-me-32chars}
      # Points at the collector unconditionally, even when the "observability"
      # profile isn't running — the OTLP exporter retries/drops in the
      # background on a connection failure rather than crashing the app, the
      # same degrade-gracefully approach already used for Redis above.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: soc-api
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    container_name: soc-worker
    restart: unless-stopped
    profiles: ["full"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://soc:soc_dev_password@postgres:5432/soc_platform?schema=public
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: soc-worker
    ports:
      - "5514:5514/udp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: soc-web
    restart: unless-stopped
    profiles: ["full"]
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ---- observability stack — bring up with `docker compose --profile observability up` ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: soc-otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus scrape target
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    container_name: soc-tempo
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - soc-tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP API (Grafana datasource)

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: soc-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Lets Tempo's metrics-generator (span-metrics, service-graphs) push
      # derived metrics in here alongside the collector's scraped ones.
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - soc-prometheus-data:/prometheus
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: soc-alertmanager
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  loki:
    image: grafana/loki:3.3.2
    container_name: soc-loki
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./deploy/observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - soc-loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: soc-promtail
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./deploy/observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      # Read-only access to the Docker daemon's own container logs/metadata —
      # this is how Promtail discovers and tails every container's stdout
      # without each service needing its own log-shipping config.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    container_name: soc-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Local-dev-only default, same labeled-fake-secret pattern as
      # JWT_ACCESS_SECRET above — override for anything beyond throwaway use.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-dev-only-insecure-default-override-me}
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - soc-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  soc-postgres-data:
  soc-redis-data:
  soc-tempo-data:
  soc-prometheus-data:
  soc-loki-data:
  soc-grafana-data:
